version: '3.9'

services:
  redis:
    image: redis:7-alpine
    container_name: cockpit-redis
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cockpit-api
    depends_on:
      redis:
        condition: service_healthy
    environment:
      PYTHONUNBUFFERED: ${PYTHONUNBUFFERED:-1}
      REDIS_URL: redis://redis:6379
      GITHUB_TOKEN: ${GITHUB_TOKEN}
      GITHUB_OWNER: ${GITHUB_OWNER:-mlopstapus}
      GITHUB_REPOS: ${GITHUB_REPOS:-["mlopstapus/seamless"]}
      GITHUB_POLL_INTERVAL: ${GITHUB_POLL_INTERVAL:-30}
      PROFILES_DIR: ${PROFILES_DIR:-/home/claude/.claude-profiles}
      REPO_LOCAL_PATHS: ${REPO_LOCAL_PATHS:-}
      DEBUG: ${DEBUG:-false}
    volumes:
      - ${HOME_DIR:-~}/.claude-profiles:/home/claude/.claude-profiles:ro
      - ${HOME_DIR:-~}/.claude:/home/claude/.claude:ro
      - ${HOME_DIR:-~}/repos:/repos
    ports:
      - "8001:8000"

volumes:
  redis_data:
