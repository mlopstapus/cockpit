version: '3.9'

# Only Redis runs in Docker.
# The API runs as a systemd service on the host (see cockpit-api.service).
# This lets Claude Code spawn with a real host PTY and access local repos directly.

services:
  redis:
    image: redis:7-alpine
    container_name: cockpit-redis
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  redis_data:
